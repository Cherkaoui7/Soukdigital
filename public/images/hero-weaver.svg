<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f0e8"/>
      <stop offset="60%" stop-color="#ede4d3"/>
      <stop offset="100%" stop-color="#d4b896"/>
    </linearGradient>
    <!-- Loom wood gradient -->
    <linearGradient id="wood-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B5E3C"/>
      <stop offset="50%" stop-color="#A0724A"/>
      <stop offset="100%" stop-color="#7A4F2D"/>
    </linearGradient>
    <!-- Loom vertical wood -->
    <linearGradient id="wood-vert" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7A4F2D"/>
      <stop offset="50%" stop-color="#9B6640"/>
      <stop offset="100%" stop-color="#7A4F2D"/>
    </linearGradient>
    <!-- Artisan skin -->
    <linearGradient id="skin-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C68642"/>
      <stop offset="100%" stop-color="#A0632A"/>
    </linearGradient>
    <!-- Djellaba gradient -->
    <linearGradient id="djellaba-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c1603a"/>
      <stop offset="50%" stop-color="#a84d28"/>
      <stop offset="100%" stop-color="#8f3e1d"/>
    </linearGradient>
    <!-- Shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#00000040"/>
    </filter>
    <!-- Soft glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Rug pattern tile -->
    <pattern id="rug-pattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="#f5f0e8"/>
      <!-- Diamond -->
      <polygon points="20,4 36,20 20,36 4,20" fill="none" stroke="#1a1a2e" stroke-width="1.5"/>
      <!-- Inner diamond -->
      <polygon points="20,10 30,20 20,30 10,20" fill="#c1603a" opacity="0.7"/>
      <!-- Center dot -->
      <circle cx="20" cy="20" r="3" fill="#1a1a2e"/>
      <!-- Cross marks at corners -->
      <line x1="0" y1="0" x2="4" y2="4" stroke="#1a1a2e" stroke-width="1"/>
      <line x1="40" y1="0" x2="36" y2="4" stroke="#1a1a2e" stroke-width="1"/>
      <line x1="0" y1="40" x2="4" y2="36" stroke="#1a1a2e" stroke-width="1"/>
      <line x1="40" y1="40" x2="36" y2="36" stroke="#1a1a2e" stroke-width="1"/>
    </pattern>
    <!-- Zellige border tile -->
    <pattern id="zellige-border" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <rect width="30" height="30" fill="#2b2fa0"/>
      <polygon points="15,2 28,15 15,28 2,15" fill="none" stroke="#d4a843" stroke-width="1.5"/>
      <polygon points="15,8 22,15 15,22 8,15" fill="#3a8a6e" opacity="0.8"/>
      <circle cx="15" cy="15" r="2" fill="#d4a843"/>
      <rect x="0" y="0" width="30" height="30" fill="none" stroke="#d4a843" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <!-- Wall texture -->
    <linearGradient id="wall-grad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#e8d9c4"/>
      <stop offset="100%" stop-color="#d4c4a8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="800" fill="url(#bg-grad)"/>

  <!-- Zellige border frame (outer) -->
  <rect x="0" y="0" width="600" height="800" fill="url(#zellige-border)" opacity="1"/>
  <!-- Inner mask to create border effect -->
  <rect x="28" y="28" width="544" height="744" fill="url(#bg-grad)"/>

  <!-- Decorative gold border lines -->
  <rect x="28" y="28" width="544" height="744" fill="none" stroke="#d4a843" stroke-width="2"/>
  <rect x="35" y="35" width="530" height="730" fill="none" stroke="#d4a843" stroke-width="0.8" stroke-dasharray="8,4"/>

  <!-- Wall background -->
  <rect x="36" y="36" width="528" height="742" fill="url(#wall-grad)"/>

  <!-- Decorative arch at top -->
  <path d="M180,36 Q300,120 420,36" fill="none" stroke="#2b2fa0" stroke-width="3" opacity="0.6"/>
  <path d="M160,36 Q300,140 440,36" fill="none" stroke="#d4a843" stroke-width="1.5" opacity="0.5"/>

  <!-- Zellige tile accent strips (horizontal decorative bands) -->
  <!-- Top band -->
  <rect x="36" y="90" width="528" height="18" fill="#2b2fa0" opacity="0.15"/>
  <line x1="36" y1="90" x2="564" y2="90" stroke="#d4a843" stroke-width="1.5"/>
  <line x1="36" y1="108" x2="564" y2="108" stroke="#d4a843" stroke-width="1.5"/>

  <!-- Small diamond ornaments on bands -->
  <g fill="#d4a843" opacity="0.8">
    <polygon points="70,99 77,99 73.5,93 70,99 77,99" transform="translate(-3.5,0)"/>
    <polygon points="103,93 99.5,99 106.5,99" />
    <polygon points="133,93 129.5,99 136.5,99" />
    <polygon points="163,93 159.5,99 166.5,99" />
    <polygon points="193,93 189.5,99 196.5,99" />
    <polygon points="223,93 219.5,99 226.5,99" />
    <polygon points="253,93 249.5,99 256.5,99" />
    <polygon points="283,93 279.5,99 286.5,99" />
    <polygon points="313,93 309.5,99 316.5,99" />
    <polygon points="343,93 339.5,99 346.5,99" />
    <polygon points="373,93 369.5,99 376.5,99" />
    <polygon points="403,93 399.5,99 406.5,99" />
    <polygon points="433,93 429.5,99 436.5,99" />
    <polygon points="463,93 459.5,99 466.5,99" />
    <polygon points="493,93 489.5,99 496.5,99" />
    <polygon points="523,93 519.5,99 526.5,99" />
    <polygon points="553,93 549.5,99 556.5,99" />
  </g>

  <!-- ===== LOOM STRUCTURE ===== -->
  <!-- Floor -->
  <ellipse cx="300" cy="710" rx="200" ry="25" fill="#c4a882" opacity="0.5"/>

  <!-- Loom side posts -->
  <rect x="120" y="200" width="22" height="450" rx="4" fill="url(#wood-vert)" filter="url(#shadow)"/>
  <rect x="458" y="200" width="22" height="450" rx="4" fill="url(#wood-vert)" filter="url(#shadow)"/>

  <!-- Loom top beam -->
  <rect x="112" y="195" width="376" height="28" rx="5" fill="url(#wood-grad)" filter="url(#shadow)"/>
  <!-- Beam detail -->
  <rect x="112" y="200" width="376" height="5" fill="#d4a843" opacity="0.4"/>
  <!-- Decorative notches on beam -->
  <g fill="#7A4F2D">
    <rect x="135" y="195" width="3" height="28"/>
    <rect x="175" y="195" width="3" height="28"/>
    <rect x="215" y="195" width="3" height="28"/>
    <rect x="300" y="195" width="4" height="28"/>
    <rect x="385" y="195" width="3" height="28"/>
    <rect x="425" y="195" width="3" height="28"/>
    <rect x="462" y="195" width="3" height="28"/>
  </g>

  <!-- Loom bottom beam -->
  <rect x="112" y="600" width="376" height="28" rx="5" fill="url(#wood-grad)" filter="url(#shadow)"/>
  <rect x="112" y="600" width="376" height="5" fill="#d4a843" opacity="0.3"/>

  <!-- Warp threads (vertical strings on loom) -->
  <g stroke="#f5f0e8" stroke-width="1" opacity="0.8">
    <line x1="148" y1="223" x2="148" y2="600"/>
    <line x1="155" y1="223" x2="155" y2="600"/>
    <line x1="162" y1="223" x2="162" y2="600"/>
    <line x1="169" y1="223" x2="169" y2="600"/>
    <line x1="176" y1="223" x2="176" y2="600"/>
    <line x1="183" y1="223" x2="183" y2="600"/>
    <line x1="190" y1="223" x2="190" y2="600"/>
    <line x1="197" y1="223" x2="197" y2="600"/>
    <line x1="204" y1="223" x2="204" y2="600"/>
    <line x1="211" y1="223" x2="211" y2="600"/>
    <line x1="218" y1="223" x2="218" y2="600"/>
    <line x1="225" y1="223" x2="225" y2="600"/>
    <line x1="232" y1="223" x2="232" y2="600"/>
    <line x1="239" y1="223" x2="239" y2="600"/>
    <line x1="246" y1="223" x2="246" y2="600"/>
    <line x1="253" y1="223" x2="253" y2="600"/>
    <line x1="260" y1="223" x2="260" y2="600"/>
    <line x1="267" y1="223" x2="267" y2="600"/>
    <line x1="274" y1="223" x2="274" y2="600"/>
    <line x1="281" y1="223" x2="281" y2="600"/>
    <line x1="288" y1="223" x2="288" y2="600"/>
    <line x1="295" y1="223" x2="295" y2="600"/>
    <line x1="302" y1="223" x2="302" y2="600"/>
    <line x1="309" y1="223" x2="309" y2="600"/>
    <line x1="316" y1="223" x2="316" y2="600"/>
    <line x1="323" y1="223" x2="323" y2="600"/>
    <line x1="330" y1="223" x2="330" y2="600"/>
    <line x1="337" y1="223" x2="337" y2="600"/>
    <line x1="344" y1="223" x2="344" y2="600"/>
    <line x1="351" y1="223" x2="351" y2="600"/>
    <line x1="358" y1="223" x2="358" y2="600"/>
    <line x1="365" y1="223" x2="365" y2="600"/>
    <line x1="372" y1="223" x2="372" y2="600"/>
    <line x1="379" y1="223" x2="379" y2="600"/>
    <line x1="386" y1="223" x2="386" y2="600"/>
    <line x1="393" y1="223" x2="393" y2="600"/>
    <line x1="400" y1="223" x2="400" y2="600"/>
    <line x1="407" y1="223" x2="407" y2="600"/>
    <line x1="414" y1="223" x2="414" y2="600"/>
    <line x1="421" y1="223" x2="421" y2="600"/>
    <line x1="428" y1="223" x2="428" y2="600"/>
    <line x1="435" y1="223" x2="435" y2="600"/>
    <line x1="442" y1="223" x2="442" y2="600"/>
    <line x1="449" y1="223" x2="449" y2="600"/>
    <line x1="456" y1="223" x2="456" y2="600"/>
  </g>

  <!-- ===== WOVEN RUG ON LOOM ===== -->
  <!-- Rug background (woven area) -->
  <rect x="142" y="223" width="316" height="320" fill="#f5f0e8"/>

  <!-- Rug pattern rows using zellige/berber motifs -->
  <!-- Row 1: cream base with black geometric -->
  <rect x="142" y="223" width="316" height="35" fill="#f5f0e8"/>
  <!-- Zigzag border -->
  <polyline points="142,240 155,228 168,240 181,228 194,240 207,228 220,240 233,228 246,240 259,228 272,240 285,228 298,240 311,228 324,240 337,228 350,240 363,228 376,240 389,228 402,240 415,228 428,240 441,228 454,240 458,240" fill="none" stroke="#1a1a2e" stroke-width="2"/>

  <!-- Diamond band -->
  <rect x="142" y="258" width="316" height="50" fill="#c1603a" opacity="0.85"/>
  <!-- Diamonds in band -->
  <g fill="#f5f0e8" stroke="#1a1a2e" stroke-width="1">
    <polygon points="165,283 175,270 185,283 175,296"/>
    <polygon points="200,283 210,270 220,283 210,296"/>
    <polygon points="235,283 245,270 255,283 245,296"/>
    <polygon points="270,283 280,270 290,283 280,296"/>
    <polygon points="305,283 315,270 325,283 315,296"/>
    <polygon points="340,283 350,270 360,283 350,296"/>
    <polygon points="375,283 385,270 395,283 385,296"/>
    <polygon points="410,283 420,270 430,283 420,296"/>
    <polygon points="445,283 455,270 458,283"/>
  </g>
  <!-- Gold dots in diamonds -->
  <g fill="#d4a843">
    <circle cx="175" cy="283" r="3"/>
    <circle cx="210" cy="283" r="3"/>
    <circle cx="245" cy="283" r="3"/>
    <circle cx="280" cy="283" r="3"/>
    <circle cx="315" cy="283" r="3"/>
    <circle cx="350" cy="283" r="3"/>
    <circle cx="385" cy="283" r="3"/>
    <circle cx="420" cy="283" r="3"/>
  </g>

  <!-- Main pattern area: cream with charcoal symbols -->
  <rect x="142" y="308" width="316" height="180" fill="#f0ebe0"/>
  <!-- Large central diamond motif -->
  <polygon points="300,318 380,398 300,478 220,398" fill="none" stroke="#1a1a2e" stroke-width="2.5"/>
  <polygon points="300,338 360,398 300,458 240,398" fill="none" stroke="#1a1a2e" stroke-width="1.5"/>
  <polygon points="300,355 345,398 300,441 255,398" fill="#c1603a" opacity="0.5"/>
  <circle cx="300" cy="398" r="12" fill="#1a1a2e"/>
  <circle cx="300" cy="398" r="6" fill="#d4a843"/>
  <!-- Cross symbols flanking -->
  <g stroke="#1a1a2e" stroke-width="2" fill="none">
    <!-- Left cross -->
    <line x1="178" y1="378" x2="178" y2="418"/>
    <line x1="158" y1="398" x2="198" y2="398"/>
    <rect x="166" y="386" width="24" height="24" fill="none" stroke="#1a1a2e" stroke-width="1" transform="rotate(45,178,398)"/>
    <!-- Right cross -->
    <line x1="422" y1="378" x2="422" y2="418"/>
    <line x1="402" y1="398" x2="442" y2="398"/>
    <rect x="410" y="386" width="24" height="24" fill="none" stroke="#1a1a2e" stroke-width="1" transform="rotate(45,422,398)"/>
  </g>
  <!-- Corner star motifs -->
  <g stroke="#1a1a2e" stroke-width="1.5" fill="none">
    <polygon points="165,330 172,318 179,330 172,342" />
    <polygon points="172,318 184,325 172,342 160,325" />
    <polygon points="421,330 428,318 435,330 428,342" />
    <polygon points="428,318 440,325 428,342 416,325" />
    <polygon points="165,455 172,443 179,455 172,467" />
    <polygon points="172,443 184,450 172,467 160,450" />
    <polygon points="421,455 428,443 435,455 428,467" />
    <polygon points="428,443 440,450 428,467 416,450" />
  </g>

  <!-- Bottom zigzag band -->
  <rect x="142" y="488" width="316" height="30" fill="#2b2fa0" opacity="0.8"/>
  <polyline points="142,503 155,491 168,503 181,491 194,503 207,491 220,503 233,491 246,503 259,491 272,503 285,491 298,503 311,491 324,503 337,491 350,503 363,491 376,503 389,491 402,503 415,491 428,503 441,491 454,503 458,503" fill="none" stroke="#d4a843" stroke-width="2"/>

  <!-- Bottom cream border with crosses -->
  <rect x="142" y="518" width="316" height="25" fill="#f5f0e8"/>
  <g fill="#1a1a2e">
    <rect x="155" y="524" width="3" height="13"/>
    <rect x="149" y="530" width="15" height="3"/>
    <rect x="185" y="524" width="3" height="13"/>
    <rect x="179" y="530" width="15" height="3"/>
    <rect x="215" y="524" width="3" height="13"/>
    <rect x="209" y="530" width="15" height="3"/>
    <rect x="245" y="524" width="3" height="13"/>
    <rect x="239" y="530" width="15" height="3"/>
    <rect x="275" y="524" width="3" height="13"/>
    <rect x="269" y="530" width="15" height="3"/>
    <rect x="305" y="524" width="3" height="13"/>
    <rect x="299" y="530" width="15" height="3"/>
    <rect x="335" y="524" width="3" height="13"/>
    <rect x="329" y="530" width="15" height="3"/>
    <rect x="365" y="524" width="3" height="13"/>
    <rect x="359" y="530" width="15" height="3"/>
    <rect x="395" y="524" width="3" height="13"/>
    <rect x="389" y="530" width="15" height="3"/>
    <rect x="425" y="524" width="3" height="13"/>
    <rect x="419" y="530" width="15" height="3"/>
    <rect x="447" y="524" width="3" height="13"/>
    <rect x="441" y="530" width="13" height="3"/>
  </g>

  <!-- Shed stick (weaving rod) -->
  <rect x="140" y="540" width="320" height="10" rx="3" fill="url(#wood-grad)" opacity="0.9"/>

  <!-- ===== ARTISAN FIGURE ===== -->
  <!-- Seated body / djellaba -->
  <ellipse cx="300" cy="680" rx="90" ry="55" fill="url(#djellaba-grad)" filter="url(#shadow)"/>
  <!-- Djellaba body -->
  <path d="M220,640 Q230,620 260,610 Q300,600 340,610 Q370,620 380,640 L385,700 Q370,720 300,725 Q230,720 215,700 Z" fill="url(#djellaba-grad)" filter="url(#shadow)"/>
  <!-- Djellaba folds -->
  <path d="M260,610 Q270,650 265,700" fill="none" stroke="#8f3e1d" stroke-width="2" opacity="0.6"/>
  <path d="M340,610 Q330,650 335,700" fill="none" stroke="#8f3e1d" stroke-width="2" opacity="0.6"/>
  <!-- Hood/headscarf -->
  <ellipse cx="300" cy="595" rx="40" ry="35" fill="#c1603a"/>
  <path d="M265,580 Q275,555 300,550 Q325,555 335,580" fill="#a84d28"/>
  <!-- Headscarf detail -->
  <path d="M262,590 Q275,570 300,565 Q325,570 338,590" fill="none" stroke="#d4a843" stroke-width="2"/>
  <!-- Face -->
  <ellipse cx="300" cy="595" rx="22" ry="26" fill="url(#skin-grad)"/>
  <!-- Eyes -->
  <ellipse cx="291" cy="590" rx="4" ry="3.5" fill="#2a1a0a"/>
  <ellipse cx="309" cy="590" rx="4" ry="3.5" fill="#2a1a0a"/>
  <!-- Eyebrows -->
  <path d="M286,585 Q291,582 296,585" fill="none" stroke="#5a3010" stroke-width="2" stroke-linecap="round"/>
  <path d="M304,585 Q309,582 314,585" fill="none" stroke="#5a3010" stroke-width="2" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M300,594 Q297,601 300,604 Q303,601 300,594" fill="#9a5020" opacity="0.5"/>
  <!-- Mouth - gentle smile -->
  <path d="M293,610 Q300,615 307,610" fill="none" stroke="#9a5020" stroke-width="2" stroke-linecap="round"/>

  <!-- Arms reaching to loom -->
  <!-- Left arm -->
  <path d="M255,640 Q210,610 190,570" fill="none" stroke="#C68642" stroke-width="14" stroke-linecap="round"/>
  <path d="M255,640 Q210,610 190,570" fill="none" stroke="#c1603a" stroke-width="16" stroke-linecap="round" opacity="0.4"/>
  <!-- Left hand -->
  <ellipse cx="188" cy="566" rx="12" ry="9" fill="#C68642" transform="rotate(-20,188,566)"/>

  <!-- Right arm -->
  <path d="M345,640 Q390,610 410,570" fill="none" stroke="#C68642" stroke-width="14" stroke-linecap="round"/>
  <path d="M345,640 Q390,610 410,570" fill="none" stroke="#c1603a" stroke-width="16" stroke-linecap="round" opacity="0.4"/>
  <!-- Right hand -->
  <ellipse cx="412" cy="566" rx="12" ry="9" fill="#C68642" transform="rotate(20,412,566)"/>

  <!-- Shuttle (weaving tool) in right hand -->
  <ellipse cx="420" cy="562" rx="20" ry="7" fill="url(#wood-grad)" transform="rotate(-15,420,562)"/>

  <!-- Djellaba gold trim -->
  <path d="M265,612 Q300,608 335,612" fill="none" stroke="#d4a843" stroke-width="2"/>
  <path d="M270,617 Q300,613 330,617" fill="none" stroke="#d4a843" stroke-width="1" opacity="0.7"/>

  <!-- ===== BOTTOM LABEL AREA ===== -->
  <rect x="36" y="718" width="528" height="54" fill="#2b2fa0" opacity="0.9"/>
  <!-- Gold ornament lines -->
  <line x1="50" y1="726" x2="550" y2="726" stroke="#d4a843" stroke-width="1"/>
  <line x1="50" y1="762" x2="550" y2="762" stroke="#d4a843" stroke-width="1"/>
  <!-- Small diamond ornaments -->
  <polygon points="300,722 305,726 300,730 295,726" fill="#d4a843"/>
  <polygon points="180,722 185,726 180,730 175,726" fill="#d4a843"/>
  <polygon points="420,722 425,726 420,730 415,726" fill="#d4a843"/>

  <!-- Label text -->
  <text x="300" y="745" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#d4a843" text-anchor="middle" letter-spacing="4">AZILAL · MAROC</text>
  <text x="300" y="758" font-family="Georgia, serif" font-size="10" fill="#f5f0e8" text-anchor="middle" letter-spacing="3" opacity="0.8">ARTISANAT BERBÈRE · TISSAGE TRADITIONNEL</text>

  <!-- Top title area decoration -->
  <!-- Star of Riad top center -->
  <g transform="translate(300,65)" fill="#d4a843">
    <polygon points="0,-12 3,-4 11,-4 5,1 7,9 0,5 -7,9 -5,1 -11,-4 -3,-4" opacity="0.9"/>
  </g>
  <!-- Flanking stars -->
  <g transform="translate(200,65)" fill="#d4a843" opacity="0.6">
    <polygon points="0,-8 2,-3 7,-3 3,1 5,6 0,3 -5,6 -3,1 -7,-3 -2,-3"/>
  </g>
  <g transform="translate(400,65)" fill="#d4a843" opacity="0.6">
    <polygon points="0,-8 2,-3 7,-3 3,1 5,6 0,3 -5,6 -3,1 -7,-3 -2,-3"/>
  </g>

  <!-- Title text above loom -->
  <text x="300" y="160" font-family="Georgia, serif" font-size="13" fill="#2b2fa0" text-anchor="middle" letter-spacing="3" opacity="0.8">ARTISANE BERBÈRE</text>
  <line x1="150" y1="165" x2="230" y2="165" stroke="#d4a843" stroke-width="1"/>
  <line x1="370" y1="165" x2="450" y2="165" stroke="#d4a843" stroke-width="1"/>

</svg>
