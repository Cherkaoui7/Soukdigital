<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <!-- Warm terracotta background -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#d4856a"/>
      <stop offset="60%" stop-color="#c1603a"/>
      <stop offset="100%" stop-color="#8b3a20"/>
    </radialGradient>

    <!-- Floor/surface gradient -->
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b05030"/>
      <stop offset="100%" stop-color="#7a2f10"/>
    </linearGradient>

    <!-- Leather top gradient - natural tan -->
    <radialGradient id="leatherTop" cx="42%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#e8c898"/>
      <stop offset="30%" stop-color="#d4a870"/>
      <stop offset="70%" stop-color="#b88a50"/>
      <stop offset="100%" stop-color="#8a6030"/>
    </radialGradient>

    <!-- Leather side gradient -->
    <linearGradient id="leatherSide" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c8a068"/>
      <stop offset="40%" stop-color="#b08040"/>
      <stop offset="100%" stop-color="#7a5020"/>
    </linearGradient>

    <!-- Leather side left highlight -->
    <linearGradient id="leatherSideHL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e0b878" stop-opacity="0.6"/>
      <stop offset="20%" stop-color="#d4a060" stop-opacity="0"/>
      <stop offset="80%" stop-color="#d4a060" stop-opacity="0"/>
      <stop offset="100%" stop-color="#907040" stop-opacity="0.5"/>
    </linearGradient>

    <!-- Embroidery thread gradient -->
    <linearGradient id="embGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a843"/>
      <stop offset="50%" stop-color="#f0c860"/>
      <stop offset="100%" stop-color="#a07820"/>
    </linearGradient>

    <!-- Red embroidery -->
    <linearGradient id="redEmb" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c1603a"/>
      <stop offset="50%" stop-color="#e07850"/>
      <stop offset="100%" stop-color="#c1603a"/>
    </linearGradient>

    <!-- Label gradient -->
    <linearGradient id="labelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5c1800"/>
      <stop offset="100%" stop-color="#3a0e00"/>
    </linearGradient>

    <!-- Zellige border pattern -->
    <pattern id="zelligeBorder" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="#8b3a20"/>
      <polygon points="20,2 23,14 35,14 25,22 29,35 20,27 11,35 15,22 5,14 17,14" fill="#d4a843" opacity="0.9"/>
      <rect x="16" y="16" width="8" height="8" fill="#3a8a6e" transform="rotate(45,20,20)"/>
      <circle cx="20" cy="20" r="3" fill="#f5f0e8" opacity="0.5"/>
    </pattern>

    <!-- Wall tile pattern for background -->
    <pattern id="wallPattern" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <rect width="80" height="80" fill="none"/>
      <circle cx="40" cy="40" r="15" fill="none" stroke="#ff8040" stroke-width="0.5" opacity="0.15"/>
      <polygon points="40,25 44,36 56,36 46,43 50,54 40,47 30,54 34,43 24,36 36,36" fill="none" stroke="#d4a843" stroke-width="0.5" opacity="0.1"/>
    </pattern>

    <!-- Drop shadow -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#3a1000" flood-opacity="0.6"/>
    </filter>

    <!-- Leather texture filter -->
    <filter id="leatherFilter">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Fringe color gradient -->
    <linearGradient id="fringeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b08040"/>
      <stop offset="100%" stop-color="#806020"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="800" fill="url(#bgGrad)"/>
  <rect width="600" height="800" fill="url(#wallPattern)" opacity="0.4"/>

  <!-- Floor / tabletop surface -->
  <ellipse cx="300" cy="620" rx="280" ry="60" fill="url(#floorGrad)" opacity="0.7"/>

  <!-- Zellige border -->
  <rect x="0" y="0" width="600" height="28" fill="url(#zelligeBorder)" opacity="0.85"/>
  <rect x="0" y="772" width="600" height="28" fill="url(#zelligeBorder)" opacity="0.85"/>
  <rect x="0" y="0" width="28" height="800" fill="url(#zelligeBorder)" opacity="0.85"/>
  <rect x="572" y="0" width="28" height="800" fill="url(#zelligeBorder)" opacity="0.85"/>

  <!-- POUF SHADOW on ground -->
  <ellipse cx="300" cy="618" rx="175" ry="30" fill="#3a1000" opacity="0.5"/>

  <!-- POUF SIDE - cylindrical body -->
  <g filter="url(#dropShadow)">
    <!-- Side body - elliptical cylinder -->
    <path d="M120,450
             Q120,430 300,418
             Q480,430 480,450
             L480,580
             Q480,600 300,610
             Q120,600 120,580 Z"
          fill="url(#leatherSide)"/>

    <!-- Side leather highlight/sheen -->
    <path d="M120,450
             Q120,430 300,418
             Q480,430 480,450
             L480,580
             Q480,600 300,610
             Q120,600 120,580 Z"
          fill="url(#leatherSideHL)" opacity="0.5"/>

    <!-- Leather panel divisions on side - 8 sections -->
    <g stroke="#8a6030" stroke-width="1.5" fill="none" opacity="0.6">
      <!-- Vertical seam lines around circumference -->
      <path d="M147,422 Q148,430 148,515 Q148,590 148,608"/>
      <path d="M190,418 Q191,426 191,515 Q191,593 191,611"/>
      <path d="M245,416 Q246,424 246,515 Q246,595 246,612"/>
      <path d="M300,415 Q301,423 301,515 Q301,596 301,612"/>
      <path d="M355,416 Q356,424 356,515 Q356,595 356,612"/>
      <path d="M410,418 Q411,426 411,515 Q411,593 411,611"/>
      <path d="M453,422 Q454,430 454,515 Q454,590 454,608"/>
    </g>

    <!-- Top horizontal stitching on side -->
    <ellipse cx="300" cy="432" rx="180" ry="14" fill="none" stroke="#a07030" stroke-width="2" stroke-dasharray="6,3" opacity="0.7"/>
    <!-- Bottom horizontal stitching on side -->
    <ellipse cx="300" cy="596" rx="180" ry="14" fill="none" stroke="#a07030" stroke-width="2" stroke-dasharray="6,3" opacity="0.7"/>
    <!-- Middle horizontal band -->
    <ellipse cx="300" cy="515" rx="180" ry="14" fill="none" stroke="#a07030" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.4"/>

    <!-- FRINGE - decorative tassels around bottom -->
    <g fill="url(#fringeGrad)" opacity="0.9">
      <!-- Individual fringe strands -->
      <line x1="131" y1="598" x2="125" y2="628" stroke="#a07828" stroke-width="3"/>
      <line x1="147" y1="603" x2="142" y2="634" stroke="#906018" stroke-width="2.5"/>
      <line x1="163" y1="607" x2="158" y2="638" stroke="#a07828" stroke-width="3"/>
      <line x1="179" y1="610" x2="175" y2="640" stroke="#906018" stroke-width="2.5"/>
      <line x1="195" y1="612" x2="191" y2="642" stroke="#a07828" stroke-width="3"/>
      <line x1="211" y1="613" x2="208" y2="643" stroke="#906018" stroke-width="2.5"/>
      <line x1="227" y1="614" x2="224" y2="644" stroke="#a07828" stroke-width="3"/>
      <line x1="243" y1="614" x2="240" y2="644" stroke="#906018" stroke-width="2.5"/>
      <line x1="259" y1="614" x2="257" y2="644" stroke="#a07828" stroke-width="3"/>
      <line x1="275" y1="614" x2="273" y2="644" stroke="#906018" stroke-width="2.5"/>
      <line x1="291" y1="614" x2="289" y2="644" stroke="#a07828" stroke-width="3"/>
      <line x1="307" y1="614" x2="305" y2="644" stroke="#906018" stroke-width="2.5"/>
      <line x1="323" y1="614" x2="321" y2="644" stroke="#a07828" stroke-width="3"/>
      <line x1="339" y1="614" x2="337" y2="644" stroke="#906018" stroke-width="2.5"/>
      <line x1="355" y1="614" x2="353" y2="643" stroke="#a07828" stroke-width="3"/>
      <line x1="371" y1="613" x2="369" y2="643" stroke="#906018" stroke-width="2.5"/>
      <line x1="387" y1="612" x2="385" y2="642" stroke="#a07828" stroke-width="3"/>
      <line x1="403" y1="610" x2="401" y2="640" stroke="#906018" stroke-width="2.5"/>
      <line x1="419" y1="607" x2="418" y2="637" stroke="#a07828" stroke-width="3"/>
      <line x1="435" y1="603" x2="435" y2="633" stroke="#906018" stroke-width="2.5"/>
      <line x1="451" y1="598" x2="452" y2="628" stroke="#a07828" stroke-width="3"/>
      <line x1="464" y1="594" x2="466" y2="622" stroke="#906018" stroke-width="2.5"/>
      <!-- Fringe end tufts (small circles) -->
      <circle cx="125" cy="630" r="3" fill="#8a6018"/>
      <circle cx="142" cy="636" r="2.5" fill="#8a6018"/>
      <circle cx="158" cy="640" r="3" fill="#8a6018"/>
      <circle cx="175" cy="641" r="2.5" fill="#8a6018"/>
      <circle cx="191" cy="643" r="3" fill="#8a6018"/>
      <circle cx="208" cy="644" r="2.5" fill="#8a6018"/>
      <circle cx="224" cy="645" r="3" fill="#8a6018"/>
      <circle cx="240" cy="645" r="2.5" fill="#8a6018"/>
      <circle cx="257" cy="645" r="3" fill="#8a6018"/>
      <circle cx="273" cy="645" r="2.5" fill="#8a6018"/>
      <circle cx="289" cy="645" r="3" fill="#8a6018"/>
      <circle cx="305" cy="645" r="2.5" fill="#8a6018"/>
      <circle cx="321" cy="645" r="3" fill="#8a6018"/>
      <circle cx="337" cy="645" r="2.5" fill="#8a6018"/>
      <circle cx="353" cy="644" r="3" fill="#8a6018"/>
      <circle cx="369" cy="644" r="2.5" fill="#8a6018"/>
      <circle cx="385" cy="643" r="3" fill="#8a6018"/>
      <circle cx="401" cy="641" r="2.5" fill="#8a6018"/>
      <circle cx="418" cy="638" r="3" fill="#8a6018"/>
      <circle cx="435" cy="635" r="2.5" fill="#8a6018"/>
      <circle cx="452" cy="630" r="3" fill="#8a6018"/>
      <circle cx="466" cy="624" r="2.5" fill="#8a6018"/>
    </g>
  </g>

  <!-- POUF TOP - elliptical top surface with embroidery -->
  <g filter="url(#dropShadow)">
    <!-- Top leather surface -->
    <ellipse cx="300" cy="435" rx="180" ry="85" fill="url(#leatherTop)"/>

    <!-- Top leather border stitching ring -->
    <ellipse cx="300" cy="435" rx="174" ry="80" fill="none" stroke="#a07030" stroke-width="2" stroke-dasharray="7,4"/>

    <!-- Embroidery on top - Classic Moroccan 8-pointed star (Star of Solomon pattern) -->

    <!-- OUTER ring of embroidery - connecting scallops -->
    <g stroke="url(#embGrad)" stroke-width="2.5" fill="none">
      <!-- 8 petal arcs -->
      <path d="M300,368 Q330,372 348,388"/>
      <path d="M348,388 Q370,410 368,435"/>
      <path d="M368,435 Q370,460 348,482"/>
      <path d="M348,482 Q330,498 300,502"/>
      <path d="M300,502 Q270,498 252,482"/>
      <path d="M252,482 Q230,460 232,435"/>
      <path d="M232,435 Q230,410 252,388"/>
      <path d="M252,388 Q270,372 300,368"/>
    </g>

    <!-- 8-pointed star - outer star -->
    <polygon points="
      300,372
      311,398
      338,388
      322,410
      358,410
      330,427
      350,450
      318,445
      310,475
      300,452
      290,475
      282,445
      250,450
      270,427
      242,410
      278,410
      262,388
      289,398"
      fill="none" stroke="url(#embGrad)" stroke-width="2.5" stroke-linejoin="round"/>

    <!-- Inner hexagon fill -->
    <polygon points="
      300,398
      316,410
      322,427
      314,444
      300,450
      286,444
      278,427
      284,410"
      fill="#c8a060" opacity="0.3" stroke="url(#embGrad)" stroke-width="2"/>

    <!-- Center medallion -->
    <circle cx="300" cy="427" r="22" fill="none" stroke="url(#embGrad)" stroke-width="2.5"/>
    <circle cx="300" cy="427" r="14" fill="#d4a843" opacity="0.5" stroke="#a07820" stroke-width="1.5"/>
    <circle cx="300" cy="427" r="7" fill="url(#embGrad)"/>

    <!-- Red accent embroidery cross pattern -->
    <g stroke="url(#redEmb)" stroke-width="2" fill="none">
      <line x1="300" y1="400" x2="300" y2="415"/>
      <line x1="300" y1="439" x2="300" y2="454"/>
      <line x1="277" y1="427" x2="291" y2="427"/>
      <line x1="309" y1="427" x2="323" y2="427"/>
      <line x1="283" y1="410" x2="293" y2="420"/>
      <line x1="307" y1="434" x2="317" y2="444"/>
      <line x1="317" y1="410" x2="307" y2="420"/>
      <line x1="293" y1="434" x2="283" y2="444"/>
    </g>

    <!-- Outer decorative dots on top -->
    <g fill="#d4a843" opacity="0.8">
      <circle cx="300" cy="362" r="4"/>
      <circle cx="340" cy="375" r="3.5"/>
      <circle cx="368" cy="405" r="3.5"/>
      <circle cx="375" cy="435" r="4"/>
      <circle cx="368" cy="465" r="3.5"/>
      <circle cx="340" cy="495" r="3.5"/>
      <circle cx="300" cy="508" r="4"/>
      <circle cx="260" cy="495" r="3.5"/>
      <circle cx="232" cy="465" r="3.5"/>
      <circle cx="225" cy="435" r="4"/>
      <circle cx="232" cy="405" r="3.5"/>
      <circle cx="260" cy="375" r="3.5"/>
    </g>

    <!-- Teal/green accent embroidery connecting dots -->
    <g stroke="#3a8a6e" stroke-width="1.5" fill="none" opacity="0.8">
      <path d="M300,362 L340,375 L368,405 L375,435 L368,465 L340,495 L300,508 L260,495 L232,465 L225,435 L232,405 L260,375 Z"/>
    </g>
  </g>

  <!-- Bottom label strip -->
  <rect x="0" y="720" width="600" height="80" fill="url(#labelGrad)"/>
  <rect x="0" y="720" width="600" height="3" fill="#d4a843"/>

  <!-- Label text -->
  <text x="300" y="752" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#d4a843" letter-spacing="4">MARRAKECH</text>
  <text x="300" y="775" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" fill="#f5f0e8" letter-spacing="2" font-weight="bold">Cuir tanné</text>

  <!-- Label stars -->
  <polygon points="100,758 102,764 108,764 103,768 105,774 100,770 95,774 97,768 92,764 98,764" fill="#d4a843" opacity="0.8"/>
  <polygon points="500,758 502,764 508,764 503,768 505,774 500,770 495,774 497,768 492,764 498,764" fill="#d4a843" opacity="0.8"/>

  <!-- Corner decorations -->
  <g opacity="0.7">
    <rect x="28" y="28" width="30" height="30" fill="none" stroke="#d4a843" stroke-width="1.5"/>
    <polygon points="43,31 45,38 52,38 47,42 49,49 43,45 37,49 39,42 34,38 41,38" fill="#d4a843"/>
    <rect x="542" y="28" width="30" height="30" fill="none" stroke="#d4a843" stroke-width="1.5"/>
    <polygon points="557,31 559,38 566,38 561,42 563,49 557,45 551,49 553,42 548,38 555,38" fill="#d4a843"/>
    <rect x="28" y="742" width="30" height="30" fill="none" stroke="#d4a843" stroke-width="1.5"/>
    <polygon points="43,745 45,752 52,752 47,756 49,763 43,759 37,763 39,756 34,752 41,752" fill="#d4a843"/>
    <rect x="542" y="742" width="30" height="30" fill="none" stroke="#d4a843" stroke-width="1.5"/>
    <polygon points="557,745 559,752 566,752 561,756 563,763 557,759 551,763 553,756 548,752 555,752" fill="#d4a843"/>
  </g>
</svg>
