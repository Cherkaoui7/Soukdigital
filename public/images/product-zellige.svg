<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <!-- Warm neutral background -->
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#e8d5b8"/>
      <stop offset="60%" stop-color="#c8a878"/>
      <stop offset="100%" stop-color="#9a7040"/>
    </radialGradient>

    <!-- Wooden tray rim gradient -->
    <linearGradient id="woodGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5e2d"/>
      <stop offset="30%" stop-color="#a0703a"/>
      <stop offset="60%" stop-color="#7a4f24"/>
      <stop offset="100%" stop-color="#5a3a18"/>
    </linearGradient>

    <!-- Wood sheen gradient -->
    <linearGradient id="woodSheen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6a4020"/>
      <stop offset="35%" stop-color="#c08040"/>
      <stop offset="65%" stop-color="#8a5528"/>
      <stop offset="100%" stop-color="#5a3510"/>
    </linearGradient>

    <!-- Tray top shadow/depth -->
    <radialGradient id="trayDepth" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.3"/>
    </radialGradient>

    <!-- Label gradient -->
    <linearGradient id="labelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a2010"/>
      <stop offset="100%" stop-color="#1a0e08"/>
    </linearGradient>

    <!-- Zellige border pattern -->
    <pattern id="zelligeBorderPat" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="#3a2010"/>
      <polygon points="20,2 23,14 35,14 25,22 29,35 20,27 11,35 15,22 5,14 17,14" fill="#d4a843" opacity="0.9"/>
      <rect x="16" y="16" width="8" height="8" fill="#2b2fa0" transform="rotate(45,20,20)"/>
      <circle cx="20" cy="20" r="3" fill="#f5f0e8" opacity="0.5"/>
    </pattern>

    <!-- Drop shadow for tray -->
    <filter id="trayShadow" x="-15%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="15" stdDeviation="25" flood-color="#3a1000" flood-opacity="0.5"/>
    </filter>

    <!-- Zellige tile clip path (circle) -->
    <clipPath id="trayClip">
      <circle cx="300" cy="400" r="218"/>
    </clipPath>

    <!-- Tile grout effect -->
    <filter id="groutFilter">
      <feFlood flood-color="#1a1a1a" result="grout"/>
      <feComposite in="grout" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- Background surface -->
  <rect width="600" height="800" fill="url(#bgGrad)"/>

  <!-- Subtle background pattern -->
  <g opacity="0.1">
    <line x1="0" y1="100" x2="600" y2="100" stroke="#7a5020" stroke-width="1"/>
    <line x1="0" y1="200" x2="600" y2="200" stroke="#7a5020" stroke-width="1"/>
    <line x1="0" y1="300" x2="600" y2="300" stroke="#7a5020" stroke-width="1"/>
    <line x1="0" y1="400" x2="600" y2="400" stroke="#7a5020" stroke-width="1"/>
    <line x1="0" y1="500" x2="600" y2="500" stroke="#7a5020" stroke-width="1"/>
    <line x1="0" y1="600" x2="600" y2="600" stroke="#7a5020" stroke-width="1"/>
    <line x1="0" y1="700" x2="600" y2="700" stroke="#7a5020" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="800" stroke="#7a5020" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="800" stroke="#7a5020" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="800" stroke="#7a5020" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="800" stroke="#7a5020" stroke-width="1"/>
    <line x1="500" y1="0" x2="500" y2="800" stroke="#7a5020" stroke-width="1"/>
  </g>

  <!-- Zellige border -->
  <rect x="0" y="0" width="600" height="28" fill="url(#zelligeBorderPat)" opacity="0.9"/>
  <rect x="0" y="772" width="600" height="28" fill="url(#zelligeBorderPat)" opacity="0.9"/>
  <rect x="0" y="0" width="28" height="800" fill="url(#zelligeBorderPat)" opacity="0.9"/>
  <rect x="572" y="0" width="28" height="800" fill="url(#zelligeBorderPat)" opacity="0.9"/>

  <!-- Tray ground shadow -->
  <ellipse cx="300" cy="640" rx="225" ry="30" fill="#3a1000" opacity="0.4"/>

  <!-- WOODEN TRAY RIM (outer ring) -->
  <circle cx="300" cy="400" r="235" fill="url(#woodGrad)" filter="url(#trayShadow)"/>
  <!-- Wood sheen on rim -->
  <circle cx="300" cy="400" r="235" fill="url(#woodSheen)" opacity="0.4"/>
  <!-- Wood grain lines on rim -->
  <g stroke="#5a3010" stroke-width="1" fill="none" opacity="0.4">
    <circle cx="300" cy="400" r="228"/>
    <circle cx="300" cy="400" r="224"/>
    <circle cx="300" cy="400" r="220"/>
  </g>

  <!-- ZELLIGE MOSAIC SURFACE -->
  <!-- Base black grout layer -->
  <circle cx="300" cy="400" r="218" fill="#111111"/>

  <!-- ZELLIGE PATTERN - intricate geometric mosaic -->
  <!-- Using a systematic approach: center star + rings -->
  <g clip-path="url(#trayClip)">

    <!-- ============ CENTER ZONE: 8-pointed star medallion ============ -->
    <!-- Large central octagram -->
    <polygon points="300,280 315,340 365,330 330,370 365,410 315,400 320,455 300,415 280,455 285,400 235,410 270,370 235,330 285,340" fill="#2b2fa0"/>
    <!-- Second overlapping square for 8-point star -->
    <polygon points="300,260 335,330 380,340 330,385 350,440 300,415 250,440 270,385 220,340 265,330" fill="#2b2fa0" opacity="0.7"/>

    <!-- White star overlay -->
    <polygon points="300,295 310,335 350,335 318,358 330,398 300,378 270,398 282,358 250,335 290,335" fill="#f5f0e8"/>
    <!-- Inner octagram -->
    <polygon points="300,310 308,335 335,335 312,350 320,375 300,360 280,375 288,350 265,335 292,335" fill="#2b2fa0"/>

    <!-- Very center small star/rosette -->
    <circle cx="300" cy="400" r="30" fill="#c1603a"/>
    <polygon points="300,372 305,390 322,390 309,400 314,418 300,408 286,418 291,400 278,390 295,390" fill="#d4a843"/>
    <circle cx="300" cy="400" r="12" fill="#f5f0e8"/>
    <circle cx="300" cy="400" r="6" fill="#2b2fa0"/>

    <!-- ============ INNER RING: surrounding small tiles ============ -->
    <!-- 8 cobalt blue squares at 45° intervals -->
    <g fill="#2b2fa0">
      <rect x="254" y="254" width="32" height="32" transform="rotate(45,270,270)"/>
      <rect x="300" y="234" width="32" height="32" transform="rotate(45,316,250)"/>
      <rect x="346" y="254" width="32" height="32" transform="rotate(45,362,270)"/>
      <rect x="366" y="300" width="32" height="32" transform="rotate(45,382,316)"/>
      <rect x="346" y="346" width="32" height="32" transform="rotate(45,362,362)"/>
      <rect x="300" y="366" width="32" height="32" transform="rotate(45,316,382)"/>
      <rect x="254" y="346" width="32" height="32" transform="rotate(45,270,362)"/>
      <rect x="234" y="300" width="32" height="32" transform="rotate(45,250,316)"/>
    </g>

    <!-- 8 terracotta triangles between them -->
    <g fill="#c1603a">
      <polygon points="270,252 300,232 300,272"/>
      <polygon points="348,252 330,232 330,272"/>
      <polygon points="372,270 390,300 350,300"/>
      <polygon points="372,350 390,320 350,320"/>
      <polygon points="350,368 330,388 330,348"/>
      <polygon points="270,368 300,388 300,348"/>
      <polygon points="228,350 248,320 210,320"/>
      <polygon points="228,270 248,300 210,300"/>
    </g>

    <!-- Green pentagon/star arms -->
    <g fill="#3a8a6e">
      <polygon points="270,268 248,280 248,260"/>
      <polygon points="330,268 352,280 352,260"/>
      <polygon points="348,330 360,308 360,352"/>
      <polygon points="348,390 360,368 380,390"/>
      <polygon points="330,390 308,402 352,402"/>
      <polygon points="270,390 292,402 248,402"/>
      <polygon points="252,390 240,368 220,390"/>
      <polygon points="252,330 240,308 240,352"/>
    </g>

    <!-- ============ MIDDLE RING: star repeat pattern ============ -->
    <!-- 8-pointed stars around the central medallion at intermediate radius ~140px -->
    <!-- Top star -->
    <g transform="translate(300,255)">
      <polygon points="0,-22 4,-10 16,-16 10,-4 22,0 10,4 16,16 4,10 0,22 -4,10 -16,16 -10,4 -22,0 -10,-4 -16,-16 -4,-10" fill="#f5f0e8"/>
      <polygon points="0,-14 3,-6 10,-10 6,-2 14,0 6,2 10,10 3,6 0,14 -3,6 -10,10 -6,2 -14,0 -6,-2 -10,-10 -3,-6" fill="#2b2fa0"/>
      <circle cx="0" cy="0" r="5" fill="#d4a843"/>
    </g>

    <!-- Bottom star -->
    <g transform="translate(300,545)">
      <polygon points="0,-22 4,-10 16,-16 10,-4 22,0 10,4 16,16 4,10 0,22 -4,10 -16,16 -10,4 -22,0 -10,-4 -16,-16 -4,-10" fill="#f5f0e8"/>
      <polygon points="0,-14 3,-6 10,-10 6,-2 14,0 6,2 10,10 3,6 0,14 -3,6 -10,10 -6,2 -14,0 -6,-2 -10,-10 -3,-6" fill="#2b2fa0"/>
      <circle cx="0" cy="0" r="5" fill="#d4a843"/>
    </g>

    <!-- Left star -->
    <g transform="translate(155,400)">
      <polygon points="0,-22 4,-10 16,-16 10,-4 22,0 10,4 16,16 4,10 0,22 -4,10 -16,16 -10,4 -22,0 -10,-4 -16,-16 -4,-10" fill="#f5f0e8"/>
      <polygon points="0,-14 3,-6 10,-10 6,-2 14,0 6,2 10,10 3,6 0,14 -3,6 -10,10 -6,2 -14,0 -6,-2 -10,-10 -3,-6" fill="#2b2fa0"/>
      <circle cx="0" cy="0" r="5" fill="#d4a843"/>
    </g>

    <!-- Right star -->
    <g transform="translate(445,400)">
      <polygon points="0,-22 4,-10 16,-16 10,-4 22,0 10,4 16,16 4,10 0,22 -4,10 -16,16 -10,4 -22,0 -10,-4 -16,-16 -4,-10" fill="#f5f0e8"/>
      <polygon points="0,-14 3,-6 10,-10 6,-2 14,0 6,2 10,10 3,6 0,14 -3,6 -10,10 -6,2 -14,0 -6,-2 -10,-10 -3,-6" fill="#2b2fa0"/>
      <circle cx="0" cy="0" r="5" fill="#d4a843"/>
    </g>

    <!-- Diagonal stars (4 more) -->
    <g transform="translate(200,295)">
      <polygon points="0,-20 4,-9 15,-15 9,-4 20,0 9,4 15,15 4,9 0,20 -4,9 -15,15 -9,4 -20,0 -9,-4 -15,-15 -4,-9" fill="#c1603a"/>
      <circle cx="0" cy="0" r="7" fill="#d4a843"/>
      <circle cx="0" cy="0" r="3" fill="#f5f0e8"/>
    </g>
    <g transform="translate(400,295)">
      <polygon points="0,-20 4,-9 15,-15 9,-4 20,0 9,4 15,15 4,9 0,20 -4,9 -15,15 -9,4 -20,0 -9,-4 -15,-15 -4,-9" fill="#c1603a"/>
      <circle cx="0" cy="0" r="7" fill="#d4a843"/>
      <circle cx="0" cy="0" r="3" fill="#f5f0e8"/>
    </g>
    <g transform="translate(200,505)">
      <polygon points="0,-20 4,-9 15,-15 9,-4 20,0 9,4 15,15 4,9 0,20 -4,9 -15,15 -9,4 -20,0 -9,-4 -15,-15 -4,-9" fill="#c1603a"/>
      <circle cx="0" cy="0" r="7" fill="#d4a843"/>
      <circle cx="0" cy="0" r="3" fill="#f5f0e8"/>
    </g>
    <g transform="translate(400,505)">
      <polygon points="0,-20 4,-9 15,-15 9,-4 20,0 9,4 15,15 4,9 0,20 -4,9 -15,15 -9,4 -20,0 -9,-4 -15,-15 -4,-9" fill="#c1603a"/>
      <circle cx="0" cy="0" r="7" fill="#d4a843"/>
      <circle cx="0" cy="0" r="3" fill="#f5f0e8"/>
    </g>

    <!-- ============ OUTER RING: fill between stars ============ -->
    <!-- Cobalt blue rectangular fills between stars -->
    <g fill="#2b2fa0" opacity="0.85">
      <!-- Top segment -->
      <polygon points="260,225 300,182 340,225 320,260 280,260"/>
      <!-- Bottom segment -->
      <polygon points="260,575 300,618 340,575 320,540 280,540"/>
      <!-- Left segment -->
      <polygon points="125,360 82,400 125,440 160,420 160,380"/>
      <!-- Right segment -->
      <polygon points="475,360 518,400 475,440 440,420 440,380"/>
      <!-- Top-left segment -->
      <polygon points="168,248 213,202 240,240 218,270 190,262"/>
      <!-- Top-right segment -->
      <polygon points="432,248 387,202 360,240 382,270 410,262"/>
      <!-- Bottom-left segment -->
      <polygon points="168,552 213,598 240,560 218,530 190,538"/>
      <!-- Bottom-right segment -->
      <polygon points="432,552 387,598 360,560 382,530 410,538"/>
    </g>

    <!-- White/cream connecting rhombus shapes -->
    <g fill="#f5f0e8" opacity="0.9">
      <polygon points="220,260 248,238 260,268 235,285"/>
      <polygon points="380,260 352,238 340,268 365,285"/>
      <polygon points="220,540 248,562 260,532 235,515"/>
      <polygon points="380,540 352,562 340,532 365,515"/>
      <polygon points="180,340 158,368 180,395 202,368"/>
      <polygon points="420,340 442,368 420,395 398,368"/>
      <polygon points="280,220 300,198 320,220 300,235"/>
      <polygon points="280,580 300,602 320,580 300,565"/>
    </g>

    <!-- Green accent triangles -->
    <g fill="#3a8a6e" opacity="0.9">
      <polygon points="240,242 268,230 268,256"/>
      <polygon points="360,242 332,230 332,256"/>
      <polygon points="158,370 170,345 170,395"/>
      <polygon points="442,370 430,345 430,395"/>
      <polygon points="240,558 268,570 268,544"/>
      <polygon points="360,558 332,570 332,544"/>
    </g>

    <!-- Gold/amber small diamond accents -->
    <g fill="#d4a843">
      <rect x="293" y="208" width="14" height="14" transform="rotate(45,300,215)"/>
      <rect x="293" y="570" width="14" height="14" transform="rotate(45,300,577)"/>
      <rect x="164" y="393" width="14" height="14" transform="rotate(45,171,400)"/>
      <rect x="422" y="393" width="14" height="14" transform="rotate(45,429,400)"/>
      <rect x="208" y="255" width="10" height="10" transform="rotate(45,213,260)"/>
      <rect x="376" y="255" width="10" height="10" transform="rotate(45,381,260)"/>
      <rect x="208" y="528" width="10" height="10" transform="rotate(45,213,533)"/>
      <rect x="376" y="528" width="10" height="10" transform="rotate(45,381,533)"/>
    </g>

    <!-- Additional outer arc fill tiles -->
    <!-- Outer terracotta fill segments -->
    <g fill="#c1603a" opacity="0.7">
      <polygon points="180,220 213,202 220,240 195,255"/>
      <polygon points="420,220 387,202 380,240 405,255"/>
      <polygon points="180,580 213,598 220,560 195,545"/>
      <polygon points="420,580 387,598 380,560 405,545"/>
      <polygon points="130,320 110,350 140,365 155,338"/>
      <polygon points="470,320 490,350 460,365 445,338"/>
      <polygon points="130,480 110,450 140,435 155,462"/>
      <polygon points="470,480 490,450 460,435 445,462"/>
    </g>

    <!-- White zigzag border band -->
    <g stroke="#f5f0e8" stroke-width="3" fill="none" opacity="0.7">
      <circle cx="300" cy="400" r="165"/>
    </g>
    <g fill="#f5f0e8" opacity="0.6">
      <!-- 12 small rhombuses on this circle -->
      <rect x="293" y="232" width="14" height="14" transform="rotate(45,300,239)"/>
      <rect x="356" y="249" width="12" height="12" transform="rotate(45,362,255)"/>
      <rect x="398" y="296" width="12" height="12" transform="rotate(45,404,302)"/>
      <rect x="461" y="393" width="14" height="14" transform="rotate(45,468,400)"/>
      <rect x="398" y="494" width="12" height="12" transform="rotate(45,404,500)"/>
      <rect x="356" y="541" width="12" height="12" transform="rotate(45,362,547)"/>
      <rect x="293" y="558" width="14" height="14" transform="rotate(45,300,565)"/>
      <rect x="230" y="541" width="12" height="12" transform="rotate(45,236,547)"/>
      <rect x="188" y="494" width="12" height="12" transform="rotate(45,194,500)"/>
      <rect x="125" y="393" width="14" height="14" transform="rotate(45,132,400)"/>
      <rect x="188" y="296" width="12" height="12" transform="rotate(45,194,302)"/>
      <rect x="230" y="249" width="12" height="12" transform="rotate(45,236,255)"/>
    </g>

    <!-- Depth/shadow overlay -->
    <circle cx="300" cy="400" r="218" fill="url(#trayDepth)"/>

    <!-- Grout lines - major radii and rings (thin black lines) -->
    <g stroke="#111" stroke-width="1.5" fill="none" opacity="0.8">
      <circle cx="300" cy="400" r="55"/>
      <circle cx="300" cy="400" r="110"/>
      <circle cx="300" cy="400" r="165"/>
      <line x1="300" y1="182" x2="300" y2="618"/>
      <line x1="82" y1="400" x2="518" y2="400"/>
      <line x1="152" y1="252" x2="448" y2="548"/>
      <line x1="448" y1="252" x2="152" y2="548"/>
    </g>
  </g>

  <!-- Wooden rim inner edge ring -->
  <circle cx="300" cy="400" r="218" fill="none" stroke="url(#woodGrad)" stroke-width="6"/>
  <circle cx="300" cy="400" r="224" fill="none" stroke="url(#woodSheen)" stroke-width="3" opacity="0.6"/>

  <!-- Bottom label strip -->
  <rect x="0" y="720" width="600" height="80" fill="url(#labelGrad)"/>
  <rect x="0" y="720" width="600" height="3" fill="#d4a843"/>

  <!-- Label text -->
  <text x="300" y="752" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#d4a843" letter-spacing="4">FÈS</text>
  <text x="300" y="775" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" fill="#f5f0e8" letter-spacing="2" font-weight="bold">Zellige artisanal</text>

  <!-- Label stars -->
  <polygon points="100,758 102,764 108,764 103,768 105,774 100,770 95,774 97,768 92,764 98,764" fill="#d4a843" opacity="0.8"/>
  <polygon points="500,758 502,764 508,764 503,768 505,774 500,770 495,774 497,768 492,764 498,764" fill="#d4a843" opacity="0.8"/>

  <!-- Corner decorations -->
  <g opacity="0.7">
    <rect x="28" y="28" width="30" height="30" fill="none" stroke="#d4a843" stroke-width="1.5"/>
    <polygon points="43,31 45,38 52,38 47,42 49,49 43,45 37,49 39,42 34,38 41,38" fill="#d4a843"/>
    <rect x="542" y="28" width="30" height="30" fill="none" stroke="#d4a843" stroke-width="1.5"/>
    <polygon points="557,31 559,38 566,38 561,42 563,49 557,45 551,49 553,42 548,38 555,38" fill="#d4a843"/>
    <rect x="28" y="742" width="30" height="30" fill="none" stroke="#d4a843" stroke-width="1.5"/>
    <polygon points="43,745 45,752 52,752 47,756 49,763 43,759 37,763 39,756 34,752 41,752" fill="#d4a843"/>
    <rect x="542" y="742" width="30" height="30" fill="none" stroke="#d4a843" stroke-width="1.5"/>
    <polygon points="557,745 559,752 566,752 561,756 563,763 557,759 551,763 553,756 548,752 555,752" fill="#d4a843"/>
  </g>
</svg>
