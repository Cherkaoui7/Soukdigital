<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <!-- Cream background -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f0e8"/>
      <stop offset="100%" stop-color="#e8dece"/>
    </linearGradient>
    <!-- Rug cream base -->
    <linearGradient id="rug-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f4ec"/>
      <stop offset="50%" stop-color="#f2ecd8"/>
      <stop offset="100%" stop-color="#ede4cc"/>
    </linearGradient>
    <!-- Warm shadow -->
    <radialGradient id="rug-shadow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#e8dece"/>
      <stop offset="100%" stop-color="#c4aa88" stop-opacity="0.4"/>
    </radialGradient>
    <!-- Zellige border (terracotta) -->
    <pattern id="zellige" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <rect width="28" height="28" fill="#c1603a"/>
      <polygon points="14,3 25,14 14,25 3,14" fill="none" stroke="#d4a843" stroke-width="1.5"/>
      <polygon points="14,8 20,14 14,20 8,14" fill="#f5c842" opacity="0.4"/>
      <circle cx="14" cy="14" r="2" fill="#d4a843"/>
    </pattern>
    <!-- Shadow filter -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#00000035"/>
    </filter>
    <filter id="softshadow">
      <feDropShadow dx="2" dy="3" stdDeviation="5" flood-color="#00000025"/>
    </filter>
    <!-- Ambient light gradient on rug -->
    <radialGradient id="rug-light" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

