  <polyline points="88,632 102,619 116,632 130,619 144,632 158,619 172,632 186,619 200,632 214,619 228,632 242,619 256,632 270,619 284,632 298,619 312,632 326,619 340,632 354,619 368,632 382,619 396,632 410,619 424,632 438,619 452,632 466,619 480,632 494,619 508,632 512,632" fill="none" stroke="#1a1a1a" stroke-width="2"/>

