  <polyline points="88,178 102,165 116,178 130,165 144,178 158,165 172,178 186,165 200,178 214,165 228,178 242,165 256,178 270,165 284,178 298,165 312,178 326,165 340,178 354,165 368,178 382,165 396,178 410,165 424,178 438,165 452,178 466,165 480,178 494,165 508,178 512,178" fill="none" stroke="#1a1a1a" stroke-width="2"/>

