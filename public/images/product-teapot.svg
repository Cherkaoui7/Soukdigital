<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <!-- Deep blue background -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1e5a"/>
      <stop offset="50%" stop-color="#1e2270"/>
      <stop offset="100%" stop-color="#0e1240"/>
    </linearGradient>
    <!-- Silver teapot gradient -->
    <linearGradient id="silver-main" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="25%" stop-color="#c0c8d8"/>
      <stop offset="50%" stop-color="#d8dde8"/>
      <stop offset="75%" stop-color="#a8b0c0"/>
      <stop offset="100%" stop-color="#9098a8"/>
    </linearGradient>
    <!-- Silver body sheen -->
    <linearGradient id="silver-sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#808898"/>
      <stop offset="20%" stop-color="#c8d0e0"/>
      <stop offset="45%" stop-color="#f0f2f8"/>
      <stop offset="65%" stop-color="#d0d8e8"/>
      <stop offset="100%" stop-color="#9098a8"/>
    </linearGradient>
    <!-- Gold accents -->
    <linearGradient id="gold-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0d060"/>
      <stop offset="50%" stop-color="#d4a843"/>
      <stop offset="100%" stop-color="#b08020"/>
    </linearGradient>
    <!-- Tea glass gradient -->
    <linearGradient id="glass-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8f0b0" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#a8e090" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#60b840" stop-opacity="0.9"/>
    </linearGradient>
    <!-- Tray gradient -->
    <linearGradient id="tray-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2b2fa0"/>
      <stop offset="50%" stop-color="#1a1e7a"/>
      <stop offset="100%" stop-color="#0e1260"/>
    </linearGradient>
    <!-- Zellige border -->
    <pattern id="zellige" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <rect width="28" height="28" fill="#2b2fa0"/>
      <polygon points="14,3 25,14 14,25 3,14" fill="none" stroke="#d4a843" stroke-width="1.5"/>
      <polygon points="14,8 20,14 14,20 8,14" fill="#3a8a6e" opacity="0.6"/>
      <circle cx="14" cy="14" r="2" fill="#d4a843"/>
    </pattern>
    <!-- Star pattern on tray -->
    <pattern id="tray-pattern" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <rect width="30" height="30" fill="none"/>
      <polygon points="15,3 17,11 25,11 19,17 21,25 15,20 9,25 11,17 5,11 13,11" fill="#d4a843" opacity="0.2"/>
    </pattern>
    <!-- Arabesque wall -->
    <pattern id="arabesque" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <rect width="50" height="50" fill="none"/>
      <circle cx="25" cy="25" r="10" fill="none" stroke="#3a3d9a" stroke-width="0.6" opacity="0.3"/>
      <line x1="0" y1="25" x2="50" y2="25" stroke="#3a3d9a" stroke-width="0.3" opacity="0.2"/>
      <line x1="25" y1="0" x2="25" y2="50" stroke="#3a3d9a" stroke-width="0.3" opacity="0.2"/>
      <line x1="0" y1="0" x2="50" y2="50" stroke="#3a3d9a" stroke-width="0.2" opacity="0.15"/>
      <line x1="50" y1="0" x2="0" y2="50" stroke="#3a3d9a" stroke-width="0.2" opacity="0.15"/>
    </pattern>
    <!-- Shadow filter -->
    <filter id="shadow">
      <feDropShadow dx="4" dy="8" stdDeviation="8" flood-color="#00000060"/>
    </filter>
    <filter id="softshadow">
      <feDropShadow dx="2" dy="4" stdDeviation="5" flood-color="#00000040"/>
    </filter>
    <!-- Glow filter for steam -->
    <filter id="steam-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Silver glow -->
    <filter id="silver-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#arabesque)" opacity="0.5"/>

  <!-- Zellige border frame -->
  <rect x="0" y="0" width="600" height="800" fill="url(#zellige)"/>
  <rect x="28" y="28" width="544" height="744" fill="url(#bg)"/>
  <rect x="28" y="28" width="544" height="744" fill="url(#arabesque)" opacity="0.4"/>

  <!-- Gold border -->
  <rect x="28" y="28" width="544" height="744" fill="none" stroke="#d4a843" stroke-width="2.5"/>
  <rect x="36" y="36" width="528" height="728" fill="none" stroke="#d4a843" stroke-width="0.8" stroke-dasharray="8,5"/>

  <!-- Stars/dots in background -->
  <g fill="#d4a843" opacity="0.15">
    <circle cx="80" cy="150" r="1.5"/>
    <circle cx="180" cy="120" r="1"/>
    <circle cx="420" cy="140" r="1.5"/>
    <circle cx="520" cy="160" r="1"/>
    <circle cx="100" cy="250" r="1"/>
    <circle cx="500" cy="230" r="1.5"/>
    <circle cx="60" cy="380" r="1"/>
    <circle cx="540" cy="350" r="1"/>
  </g>

  <!-- Top arch / decorative motif -->
  <path d="M300,50 Q380,100 380,160 L220,160 Q220,100 300,50Z" fill="#d4a843" opacity="0.08"/>
  <path d="M220,160 Q220,95 300,52 Q380,95 380,160" fill="none" stroke="#d4a843" stroke-width="2" opacity="0.5"/>

  <!-- Top star ornament -->
  <g transform="translate(300,65)" fill="#d4a843">
    <polygon points="0,-13 3,-5 12,-5 5,2 8,10 0,5 -8,10 -5,2 -12,-5 -3,-5"/>
  </g>
  <!-- Flanking stars -->
  <g transform="translate(200,75)" fill="#d4a843" opacity="0.4">
    <polygon points="0,-8 2,-3 8,-3 3,1 5,6 0,3 -5,6 -3,1 -8,-3 -2,-3"/>
  </g>
  <g transform="translate(400,75)" fill="#d4a843" opacity="0.4">
    <polygon points="0,-8 2,-3 8,-3 3,1 5,6 0,3 -5,6 -3,1 -8,-3 -2,-3"/>
  </g>

  <!-- Decorative band below top ornament -->
  <rect x="36" y="100" width="528" height="14" fill="#d4a843" opacity="0.12"/>
  <line x1="36" y1="100" x2="564" y2="100" stroke="#d4a843" stroke-width="1.2"/>
  <line x1="36" y1="114" x2="564" y2="114" stroke="#d4a843" stroke-width="1.2"/>

  <!-- Title -->
  <text x="300" y="150" font-family="Georgia, serif" font-size="13" fill="#d4a843" text-anchor="middle" letter-spacing="3" opacity="0.8">DINANDERIE FASSI</text>
  <line x1="130" y1="156" x2="220" y2="156" stroke="#d4a843" stroke-width="1" opacity="0.5"/>
  <line x1="380" y1="156" x2="470" y2="156" stroke="#d4a843" stroke-width="1" opacity="0.5"/>

  <!-- ===== DECORATIVE TRAY ===== -->
  <!-- Tray (zellige pattern) -->
  <ellipse cx="290" cy="645" rx="210" ry="45" fill="url(#tray-grad)" filter="url(#shadow)"/>
  <ellipse cx="290" cy="645" rx="210" ry="45" fill="url(#tray-pattern)"/>
  <!-- Tray rim -->
  <ellipse cx="290" cy="645" rx="210" ry="45" fill="none" stroke="#d4a843" stroke-width="3"/>
  <ellipse cx="290" cy="645" rx="200" ry="40" fill="none" stroke="#d4a843" stroke-width="1" opacity="0.5"/>
  <!-- Tray zellige inner pattern -->
  <g stroke="#d4a843" stroke-width="0.8" fill="none" opacity="0.4">
    <ellipse cx="290" cy="645" rx="150" ry="30"/>
    <ellipse cx="290" cy="645" rx="100" ry="20"/>
    <ellipse cx="290" cy="645" rx="50" ry="10"/>
    <!-- Radial lines on tray -->
    <line x1="290" y1="615" x2="290" y2="675"/>
    <line x1="150" y1="640" x2="430" y2="650"/>
    <line x1="170" y1="625" x2="410" y2="665"/>
    <line x1="170" y1="665" x2="410" y2="625"/>
  </g>
  <!-- Gold zellige diamonds on tray -->
  <g fill="#d4a843" opacity="0.35">
    <polygon points="170,645 178,638 186,645 178,652"/>
    <polygon points="220,630 228,623 236,630 228,637"/>
    <polygon points="280,622 288,615 296,622 288,629"/>
    <polygon points="340,630 348,623 356,630 348,637"/>
    <polygon points="390,645 398,638 406,645 398,652"/>
    <polygon points="220,660 228,653 236,660 228,667"/>
    <polygon points="340,660 348,653 356,660 348,667"/>
  </g>

  <!-- ===== MINT TEA GLASS ===== -->
  <g transform="translate(450,560)" filter="url(#softshadow)">
    <!-- Glass body -->
    <path d="M-25,80 L-30,0 L30,0 L25,80 Z" fill="url(#glass-grad)"/>
    <!-- Glass rim -->
    <rect x="-30" y="-5" width="60" height="10" rx="3" fill="#d0e8c0" opacity="0.8"/>
    <!-- Mint inside -->
    <rect x="-22" y="5" width="44" height="25" fill="#5a9840" opacity="0.4"/>
    <!-- Mint leaves -->
    <ellipse cx="-10" cy="18" rx="10" ry="5" fill="#3a8a6e" opacity="0.8" transform="rotate(-20,-10,18)"/>
    <ellipse cx="8" cy="12" rx="9" ry="4" fill="#4a9a5e" opacity="0.7" transform="rotate(15,8,12)"/>
    <ellipse cx="2" cy="22" rx="8" ry="4" fill="#3a8a6e" opacity="0.6" transform="rotate(-5,2,22)"/>
    <!-- Tea liquid (amber) -->
    <rect x="-24" y="28" width="46" height="45" fill="#a8d878" opacity="0.5"/>
    <!-- Glass highlight -->
    <path d="M-25,0 L-25,80" stroke="white" stroke-width="4" opacity="0.2" stroke-linecap="round"/>
    <!-- Gold rim decoration -->
    <rect x="-30" y="-8" width="60" height="4" fill="url(#gold-grad)" rx="2"/>
    <!-- Bottom of glass -->
    <ellipse cx="0" cy="78" rx="24" ry="5" fill="#70b050" opacity="0.5"/>
    <!-- Glass arabesque engraving -->
    <path d="M-18,50 Q0,42 18,50" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
    <path d="M-18,60 Q0,52 18,60" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- ===== SILVER TEAPOT ===== -->
  <!-- Teapot spout -->
  <path d="M175,400 Q140,390 125,370 Q110,350 125,335 Q138,322 155,330 Q165,335 175,340" fill="url(#silver-main)" stroke="#909898" stroke-width="1.5" filter="url(#softshadow)"/>
  <!-- Spout tip detail -->
  <ellipse cx="123" cy="352" rx="8" ry="12" fill="url(#silver-sheen)" transform="rotate(-20,123,352)"/>
  <!-- Spout engraving -->
  <path d="M160,398 Q140,388 128,370 Q118,352 128,338" fill="none" stroke="#d0d8e8" stroke-width="1" opacity="0.5"/>

  <!-- Teapot handle (right side) -->
  <path d="M420,360 Q470,340 475,390 Q478,435 425,450" fill="none" stroke="url(#silver-main)" stroke-width="18" stroke-linecap="round" filter="url(#softshadow)"/>
  <path d="M420,360 Q470,340 475,390 Q478,435 425,450" fill="none" stroke="#c0c8d8" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
  <!-- Handle engraving -->
  <path d="M425,368 Q465,352 468,395 Q470,432 430,444" fill="none" stroke="white" stroke-width="1.5" opacity="0.25" stroke-linecap="round"/>
  <!-- Handle bands (gold) -->
  <ellipse cx="422" cy="362" rx="10" ry="6" fill="url(#gold-grad)" transform="rotate(30,422,362)"/>
  <ellipse cx="428" cy="447" rx="10" ry="6" fill="url(#gold-grad)" transform="rotate(-20,428,447)"/>

  <!-- Teapot body (main) -->
  <ellipse cx="300" cy="430" rx="148" ry="130" fill="url(#silver-sheen)" filter="url(#shadow)"/>
  <!-- Body secondary fill for depth -->
  <ellipse cx="300" cy="425" rx="145" ry="126" fill="url(#silver-main)" opacity="0.6"/>

  <!-- Engraved geometric patterns on body -->
  <!-- Central star medallion engraving -->
  <circle cx="300" cy="420" r="80" fill="none" stroke="#909898" stroke-width="1.5" opacity="0.7"/>
  <circle cx="300" cy="420" r="65" fill="none" stroke="#909898" stroke-width="1" opacity="0.5"/>
  <!-- 8-pointed star engraving -->
  <g transform="translate(300,420)" stroke="#909898" stroke-width="1.2" fill="none" opacity="0.65">
    <polygon points="0,-60 14,-14 60,0 14,14 0,60 -14,14 -60,0 -14,-14"/>
    <polygon points="0,-60 14,-14 60,0 14,14 0,60 -14,14 -60,0 -14,-14" transform="rotate(22.5)"/>
  </g>
  <!-- Inner rosette -->
  <circle cx="300" cy="420" r="25" fill="none" stroke="#909898" stroke-width="1" opacity="0.6"/>
  <circle cx="300" cy="420" r="12" fill="none" stroke="#909898" stroke-width="1.5" opacity="0.5"/>
  <g transform="translate(300,420)" fill="#b8c0d0" opacity="0.4">
    <polygon points="0,-10 3,-3 10,0 3,3 0,10 -3,3 -10,0 -3,-3"/>
  </g>

  <!-- Arabesque border band on body -->
  <ellipse cx="300" cy="490" rx="140" ry="55" fill="none" stroke="#909898" stroke-width="1.5" opacity="0.4"/>
  <path d="M175,480 Q195,468 215,476 Q235,484 255,472 Q275,460 295,472 Q315,484 335,472 Q355,460 375,472 Q395,484 415,476 Q420,474 425,473" fill="none" stroke="#909898" stroke-width="1" opacity="0.45"/>

  <!-- Gold band around body -->
  <!-- Top gold band -->
  <ellipse cx="300" cy="313" rx="95" ry="25" fill="none" stroke="url(#gold-grad)" stroke-width="4"/>
  <ellipse cx="300" cy="313" rx="88" ry="22" fill="none" stroke="#f0d060" stroke-width="1" opacity="0.5"/>
  <!-- Bottom gold band -->
  <ellipse cx="300" cy="548" rx="118" ry="30" fill="none" stroke="url(#gold-grad)" stroke-width="4"/>
  <ellipse cx="300" cy="548" rx="112" ry="28" fill="none" stroke="#f0d060" stroke-width="1" opacity="0.5"/>

  <!-- Gold filigree diamonds on bands -->
  <g fill="url(#gold-grad)">
    <polygon points="300,303 308,313 300,323 292,313"/>
    <polygon points="260,305 268,313 260,321 252,313"/>
    <polygon points="340,305 348,313 340,321 332,313"/>
    <polygon points="220,308 227,313 220,318 213,313"/>
    <polygon points="380,308 387,313 380,318 373,313"/>
  </g>

  <!-- Teapot neck -->
  <rect x="265" y="275" width="70" height="42" rx="12" fill="url(#silver-sheen)" filter="url(#softshadow)"/>
  <!-- Neck gold band -->
  <rect x="263" y="292" width="74" height="8" rx="3" fill="url(#gold-grad)" opacity="0.8"/>

  <!-- Teapot lid -->
  <ellipse cx="300" cy="278" rx="52" ry="14" fill="url(#silver-sheen)" filter="url(#softshadow)"/>
  <ellipse cx="300" cy="275" rx="48" ry="12" fill="url(#silver-main)"/>
  <!-- Lid dome -->
  <path d="M258,278 Q270,250 300,245 Q330,250 342,278" fill="url(#silver-sheen)"/>
  <path d="M260,278 Q272,253 300,248 Q328,253 340,278" fill="url(#silver-main)" opacity="0.6"/>
  <!-- Lid knob -->
  <ellipse cx="300" cy="240" rx="16" ry="8" fill="url(#gold-grad)" filter="url(#silver-glow)"/>
  <circle cx="300" cy="236" r="6" fill="#f0d060"/>
  <circle cx="300" cy="234" r="3" fill="url(#gold-grad)"/>
  <!-- Lid engraving -->
  <circle cx="300" cy="262" r="18" fill="none" stroke="#909898" stroke-width="0.8" opacity="0.5"/>

  <!-- Teapot base ring -->
  <ellipse cx="300" cy="555" rx="100" ry="20" fill="url(#silver-main)" opacity="0.7"/>
  <ellipse cx="300" cy="558" rx="95" ry="15" fill="#808898" opacity="0.5"/>
  <!-- Base gold trim -->
  <ellipse cx="300" cy="554" rx="100" ry="20" fill="none" stroke="url(#gold-grad)" stroke-width="3"/>

  <!-- ===== STEAM WISPS ===== -->
  <g fill="none" stroke-linecap="round" filter="url(#steam-glow)">
    <!-- Steam 1 - main spout steam -->
    <path d="M123,330 Q115,310 122,290 Q130,270 120,250 Q110,230 118,210" stroke="white" stroke-width="3" opacity="0.35"/>
    <!-- Steam 2 -->
    <path d="M110,325 Q100,305 108,285 Q116,265 106,245" stroke="white" stroke-width="2" opacity="0.2"/>
    <!-- Steam from lid -->
    <path d="M300,232 Q295,215 302,198 Q309,180 300,163 Q291,146 298,130" stroke="white" stroke-width="3" opacity="0.3"/>
    <path d="M315,235 Q322,215 314,198 Q306,181 314,162" stroke="white" stroke-width="2" opacity="0.2"/>
    <path d="M285,235 Q278,215 286,198 Q294,181 286,162" stroke="white" stroke-width="2" opacity="0.2"/>
  </g>

  <!-- ===== MINT SPRIG beside teapot ===== -->
  <g opacity="0.7">
    <path d="M490,590 Q488,560 492,530 Q496,500 490,470" stroke="#3a8a6e" stroke-width="2" fill="none"/>
    <ellipse cx="485" cy="545" rx="15" ry="8" fill="#3a8a6e" transform="rotate(-25,485,545)"/>
    <ellipse cx="496" cy="520" rx="14" ry="7" fill="#4a9a5e" transform="rotate(20,496,520)"/>
    <ellipse cx="488" cy="495" rx="13" ry="6" fill="#3a8a6e" transform="rotate(-10,488,495)"/>
    <ellipse cx="494" cy="472" rx="12" ry="6" fill="#4a9a5e" transform="rotate(15,494,472)"/>
  </g>

  <!-- ===== LABEL ===== -->
  <rect x="36" y="718" width="528" height="54" fill="#1a1e5a" opacity="0.95"/>
  <line x1="50" y1="726" x2="550" y2="726" stroke="#d4a843" stroke-width="1.2"/>
  <line x1="50" y1="762" x2="550" y2="762" stroke="#d4a843" stroke-width="1.2"/>
  <g fill="#d4a843">
    <polygon points="300,722 306,727 300,732 294,727"/>
    <polygon points="160,722 166,727 160,732 154,727"/>
    <polygon points="440,722 446,727 440,732 434,727"/>
  </g>
  <text x="300" y="745" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#d4a843" text-anchor="middle" letter-spacing="4">FÈS · DINANDERIE</text>
  <text x="300" y="758" font-family="Georgia, serif" font-size="10" fill="#f5f0e8" text-anchor="middle" letter-spacing="3" opacity="0.8">THÉIÈRE EN ARGENT · ART DU MÉTAL</text>
</svg>
